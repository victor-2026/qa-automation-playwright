name: Nightly Full Suite

on:
  schedule:
    # Every night at 3 AM UTC (10 AM Moscow)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Get admin token
        id: token
        run: |
          BACKEND_URL="${{ vars.BACKEND_URL }}"
          echo "Getting token from $BACKEND_URL/api/auth/login"
          RESPONSE=$(curl -s -X POST "$BACKEND_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@buzzhive.com","password":"admin123"}')
          echo "Response: $RESPONSE"
          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null | tr -d '\n')
          echo "Token length: ${#TOKEN}"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          
          echo "Resetting database..."
          curl -s -X POST "$BACKEND_URL/api/reset" -H "Authorization: Bearer $TOKEN"
      
      - name: Smoke Tests
        env:
          APP_BASE_URL: ${{ vars.BACKEND_URL }}
          API_BASE_URL: ${{ vars.BACKEND_URL }}/api
          TEST_USERNAME: alice@buzzhive.com
          TEST_PASSWORD: alice123
          TEST_ADMIN_EMAIL: admin@buzzhive.com
          TEST_ADMIN_PASSWORD: admin123
          TEST_MOD_EMAIL: mod@buzzhive.com
          TEST_MOD_PASSWORD: mod123
          TEST_BOB_EMAIL: bob@buzzhive.com
          TEST_BOB_PASSWORD: bob123
          ADMIN_TOKEN: ${{ steps.token.outputs.token }}
        run: npx playwright test e2e/smoke.spec.ts --retries=2

  full-suite:
    name: Full Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Get admin token
        id: token
        run: |
          BACKEND_URL="${{ vars.BACKEND_URL }}"
          echo "Getting token from $BACKEND_URL/api/auth/login"
          RESPONSE=$(curl -s -X POST "$BACKEND_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@buzzhive.com","password":"admin123"}')
          echo "Response: $RESPONSE"
          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null | tr -d '\n')
          echo "Token length: ${#TOKEN}"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          
          echo "Resetting database..."
          curl -s -X POST "$BACKEND_URL/api/reset" -H "Authorization: Bearer $TOKEN"
      
      - name: Full Suite
        env:
          APP_BASE_URL: ${{ vars.BACKEND_URL }}
          API_BASE_URL: ${{ vars.BACKEND_URL }}/api
          TEST_USERNAME: alice@buzzhive.com
          TEST_PASSWORD: alice123
          TEST_ADMIN_EMAIL: admin@buzzhive.com
          TEST_ADMIN_PASSWORD: admin123
          TEST_MOD_EMAIL: mod@buzzhive.com
          TEST_MOD_PASSWORD: mod123
          TEST_BOB_EMAIL: bob@buzzhive.com
          TEST_BOB_PASSWORD: bob123
          ADMIN_TOKEN: ${{ steps.token.outputs.token }}
        run: npx playwright test --retries=2