name: Nightly Full Suite

on:
  schedule:
    # Every night at 3 AM UTC (10 AM Moscow)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  # NOTE: Backend image unavailable. Run locally with docker-compose.
  # This workflow is kept for documentation purposes.
  
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Smoke Tests Skipped
        run: |
          echo "⚠️ Smoke tests skipped: backend image unavailable (ghcr.io/manikosto/buzzhive-backend)"
          echo "Run locally with: docker-compose up backend && npm run test:smoke"

  full-suite:
    name: Full Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Full Suite Skipped
        run: |
          echo "⚠️ Full suite skipped: backend image unavailable (ghcr.io/manikosto/buzzhive-backend)"
          echo "Run locally with: docker-compose up backend && npm test"
