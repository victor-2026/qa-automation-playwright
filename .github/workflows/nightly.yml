name: Nightly Full Suite

on:
  schedule:
    # Every night at 3 AM UTC (10 AM Moscow)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    services:
      backend:
        image: ghcr.io/manikosto/buzzhive-backend:latest
        ports:
          - 8000:8000
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: buzzhive
          POSTGRES_USER: buzzhive_user
          POSTGRES_PASSWORD: buzzhive_password
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            sleep 2
          done

      - name: Run Smoke Tests
        run: npx playwright test e2e/smoke.spec.ts --project=chromium
        continue-on-error: true

  full-suite:
    name: Full Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    services:
      backend:
        image: ghcr.io/manikosto/buzzhive-backend:latest
        ports:
          - 8000:8000
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: buzzhive
          POSTGRES_USER: buzzhive_user
          POSTGRES_PASSWORD: buzzhive_password
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            sleep 2
          done

      - name: Run Full Suite
        run: npm test
        continue-on-error: true
        
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
