name: Nightly Full Suite

on:
  schedule:
    # Every night at 3 AM UTC (10 AM Moscow)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  # NOTE: Backend image unavailable. Run locally with docker-compose.
  # This workflow is kept for documentation purposes.
  
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Smoke Tests
        run: |
          BACKEND_URL="${{ vars.BACKEND_URL }}"
          TOKEN=$(curl -s -X POST "$BACKEND_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@buzzhive.com","password":"admin123"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")
          curl -s -X POST "$BACKEND_URL/api/reset" -H "Authorization: Bearer $TOKEN"
          APP_BASE_URL="$BACKEND_URL" API_BASE_URL="$BACKEND_URL/api" ADMIN_TOKEN="$TOKEN" npx playwright test e2e/smoke.spec.ts --retries=2

  full-suite:
    name: Full Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Full Suite
        run: |
          BACKEND_URL="${{ vars.BACKEND_URL }}"
          TOKEN=$(curl -s -X POST "$BACKEND_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@buzzhive.com","password":"admin123"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")
          curl -s -X POST "$BACKEND_URL/api/reset" -H "Authorization: Bearer $TOKEN"
          APP_BASE_URL="$BACKEND_URL" API_BASE_URL="$BACKEND_URL/api" ADMIN_TOKEN="$TOKEN" npx playwright test --retries=2
