name: Nightly Invariants

on:
  schedule:
    # Every night at 3 AM UTC (10 AM Moscow)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      notify_slack:
        description: 'Notify Slack'
        required: false
        default: 'true'

jobs:
  invariants:
    name: System Invariants Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    services:
      backend:
        image: ghcr.io/manikosto/buzzhive-backend:latest
        ports:
          - 8000:8000
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: buzzhive
          POSTGRES_USER: buzzhive_user
          POSTGRES_PASSWORD: buzzhive_password
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Backend is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          
      - name: Run DB Invariants
        run: npm run test:db
        continue-on-error: true
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          
      - name: Run PBT Invariants
        run: npm run test:pbt
        continue-on-error: true
        env:
          API_URL: http://localhost:8000
          
      - name: Check Results
        run: |
          echo "## Invariants Check Complete"
          
      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-invariant-results
          path: coverage/
          retention-days: 30
          
      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Invariant Violation Detected',
              body: `Invariant violation detected during nightly run.\n\nTime: ${new Date().toISOString()}\n\nPlease review the test results and fix the issue.`,
              labels: ['bug', 'invariant-violation']
            })
