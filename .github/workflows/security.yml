name: Security Scan

on:
  schedule:
    # Weekly security scan (Sunday 3 AM UTC)
    - cron: '0 3 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  zap-scan:
    name: OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v5
      
      - name: OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8000/api/health'
          cmd_options: '-config api.disablekey=true'
          artifact_name: 'zap-report'
          
      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4.6.0
        with:
          name: zap-report
          path: |
            zap_report.html
            zap-baseline-report.html
            zap_report.json
          retention-days: 30
          if-no-files-found: 'warn'

  # Note: Full security scan requires local backend. Run locally with:
  # docker-compose up backend && brew install owasp-zap && zap-baseline.py -t http://localhost:8000/api/health
