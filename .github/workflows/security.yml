name: Security Scan

on:
  schedule:
    # Weekly security scan (Sunday 3 AM UTC)
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  zap-scan:
    name: OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    services:
      backend:
        image: ghcr.io/manikosto/buzzhive-backend:latest
        ports:
          - 8000:8000
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: buzzhive
          POSTGRES_USER: buzzhive_user
          POSTGRES_PASSWORD: buzzhive_password
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Wait for backend
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Backend ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/15)"
            sleep 2
          done
          echo "Backend not ready after 30s"
          exit 1
        timeout-minutes: 2
      
      - name: OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.13.0
        with:
          target: 'http://localhost:8000/api/health'
          cmd_options: '-config api.disablekey=true'
          artifact_name: 'zap-report'
          
      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            zap_report.html
            zap-baseline-report.html
            zap_report.json
          retention-days: 30
          if-no-files-found: 'warn'
