name: Playwright Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Test (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Check backend
        id: check-backend
        run: |
          echo "Checking if backend is available..."
          if curl -s --max-time 5 "${{ secrets.APP_BASE_URL }}/health" > /dev/null 2>&1; then
            echo "BACKEND_AVAILABLE=true" >> $GITHUB_OUTPUT
          else
            echo "BACKEND_AVAILABLE=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Playwright tests
        if: steps.check-backend.outputs.BACKEND_AVAILABLE == 'true'
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          API_BASE: ${{ secrets.API_BASE_URL }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_MOD_EMAIL: ${{ secrets.TEST_MOD_EMAIL }}
          TEST_MOD_PASSWORD: ${{ secrets.TEST_MOD_PASSWORD }}
          TEST_BOB_EMAIL: ${{ secrets.TEST_BOB_EMAIL }}
          TEST_BOB_PASSWORD: ${{ secrets.TEST_BOB_PASSWORD }}
        run: npx playwright test --retries=2 || true

      - name: Skip tests (no backend)
        if: steps.check-backend.outputs.BACKEND_AVAILABLE != 'true'
        run: |
          echo "⚠️ Backend not available - skipping tests"
          echo "Set APP_BASE_URL to a deployed environment to run tests"

      - name: Upload test results
        if: always() && steps.check-backend.outputs.BACKEND_AVAILABLE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.browser }}
          path: |
            test-results/
            playwright-report/

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: TypeCheck
        run: npx tsc --noEmit

      - name: Security audit
        run: npm audit --production --audit-level=high || true