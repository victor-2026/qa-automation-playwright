name: QA Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ========== LINT & TYPE CHECK (Always runs) ==========
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npx eslint e2e/ pbt/ db/ --max-warnings=0 || true
        
      - name: Type check
        run: npx tsc --noEmit || true

  # ========== NOTE ==========
  # E2E, API, PBT, DB tests require:
  # - Local Docker containers (docker-compose up)
  # - OR ghcr.io/manikosto/buzzhive-backend:latest
  # - OR ghcr.io/manikosto/buzzhive-frontend:latest
  #
  # These are private/hypothetical containers.
  # Run locally with: docker-compose up
  # Then: npm test
