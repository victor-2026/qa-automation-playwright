name: QA Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run invariants nightly at 3 AM
    - cron: '0 3 * * *'

jobs:
  # ========== E2E TESTS ==========
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    services:
      backend:
        image: ghcr.io/manikosto/buzzhive-backend:latest
        ports:
          - 8000:8000
      frontend:
        image: ghcr.io/manikosto/buzzhive-frontend:latest
        ports:
          - 3000:3000
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        
      - name: Run E2E tests
        run: npm test
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:8000

  # ========== API TESTS ==========
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    services:
      backend:
        image: ghcr.io/manikosto/buzzhive-backend:latest
        ports:
          - 8000:8000
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: buzzhive
          POSTGRES_USER: buzzhive_user
          POSTGRES_PASSWORD: buzzhive_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run API tests
        run: npx playwright test --grep "API"
        env:
          API_URL: http://localhost:8000

  # ========== PBT TESTS ==========
  pbt-tests:
    name: Property-Based Tests (PBT)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    services:
      backend:
        image: ghcr.io/manikosto/buzzhive-backend:latest
        ports:
          - 8000:8000
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run PBT tests
        run: npm run test:pbt
        env:
          API_URL: http://localhost:8000

  # ========== DATABASE TESTS ==========
  db-tests:
    name: Database Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: buzzhive
          POSTGRES_USER: buzzhive_user
          POSTGRES_PASSWORD: buzzhive_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run DB tests
        run: npm run test:db
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: buzzhive
          DB_USER: buzzhive_user
          DB_PASSWORD: buzzhive_password

  # ========== INVARIANTS (Nightly) ==========
  invariants:
    name: System Invariants (Nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    # Only run on schedule or manual trigger
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    services:
      backend:
        image: ghcr.io/manikosto/buzzhive-backend:latest
        ports:
          - 8000:8000
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: buzzhive
          POSTGRES_USER: buzzhive_user
          POSTGRES_PASSWORD: buzzhive_password
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Invariant Tests
        run: |
          echo "Running system invariants..."
          npm run test:db
          npm run test:pbt
          
      - name: Check for violations
        if: failure()
        run: |
          echo "⚠️ Invariant violations detected!"
          echo "Review test output above for details."
          
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invariant-results
          path: coverage/
          retention-days: 7

  # ========== LINT & TYPE CHECK ==========
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npx eslint e2e/ pbt/ db/
        
      - name: Type check
        run: npx tsc --noEmit

# ========== SUMMARY ==========
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [e2e-tests, api-tests, pbt-tests, db-tests, lint]
    
    steps:
      - name: Summary
        run: |
          echo "## QA Test Suite Results"
          echo "✅ All tests passed!"
          echo ""
          echo "| Job | Status |"
          echo "|------|--------|"
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |"
          echo "| API Tests | ${{ needs.api-tests.result }} |"
          echo "| PBT Tests | ${{ needs.pbt-tests.result }} |"
          echo "| DB Tests | ${{ needs.db-tests.result }} |"
          echo "| Lint | ${{ needs.lint.result }} |"
