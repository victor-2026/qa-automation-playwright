server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy
    location /api {
        proxy_pass https://buzzhive-test.onrender.com/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Uploads proxy
    location /uploads {
        proxy_pass https://buzzhive-test.onrender.com/uploads;
        proxy_http_version 1.1;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}