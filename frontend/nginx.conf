server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Exact match for /api
    location = /api {
        proxy_pass https://buzzhive-test.onrender.com/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Prefix match - higher priority than /
    location /api/ {
        proxy_pass https://buzzhive-test.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # /uploads
    location /uploads/ {
        proxy_pass https://buzzhive-test.onrender.com;
        proxy_http_version 1.1;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}