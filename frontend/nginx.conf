server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy - MUST be before catch-all /
    location /api/ {
        proxy_pass https://buzzhive-test.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Uploads proxy
    location /uploads/ {
        proxy_pass https://buzzhive-test.onrender.com;
        proxy_http_version 1.1;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}